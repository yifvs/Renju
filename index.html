<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五指棋 - AlphaGo 风格 AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>⚫ 五指棋 ⚪</h1>
        <div class="game-info">
            <div class="status" id="status">你的回合（黑棋）</div>
            <div class="controls">
                <select id="difficulty">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                    <option value="hell">地狱</option>
                </select>
                <select id="mode">
                    <option value="pva">人 vs AI</option>
                    <option value="pvp">双人对战</option>
                </select>
                <select id="firstMove">
                    <option value="black">执黑先手</option>
                    <option value="white">执白后手</option>
                </select>
                <label class="ban-label">
                    <input type="checkbox" id="banEnable" checked> 禁手
                </label>
                <button id="restartBtn">重新开始</button>
                <button id="undoBtn">悔棋</button>
            </div>
        </div>
        <div class="board-container">
            <canvas id="boardCanvas" width="544" height="544"></canvas>
        </div>
        <div class="info-panel">
            <div id="moveInfo">步数：0</div>
            <div id="aiThinking" class="thinking hidden">🤔 AI 思考中...</div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/ai/zobrist.js"></script>
    <script src="js/ai/evaluate.js"></script>
    <script src="js/ai/playout.js"></script>
    <script src="js/ai/book.js"></script>
    <script src="js/ai/referee.js"></script>
    <script src="js/ai/search.js"></script>
    <script src="js/game.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
